<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="root">
        <div class="title">
            <div>
                <h1>Notes</h1>
            </div>
            <h3 id="notesCounter">0 notes</h3>
        </div>
        
        <div class="AddNote">
            <p class="new-note-label">New Note</p>
            <div class="input-container">
                <textarea id="Note" name="note" placeholder="Write your note..."></textarea>
            </div>
            <div class="button-container">
                <button id="addNoteBtn">
                    <i class="ti ti-plus" aria-hidden="true"></i> Add Note
                </button>
            </div>
        </div>
        
        <p class="saved-label">Saved</p>
    
        <div class="Notes" id="Notes">
           
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
